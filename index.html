<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>手机端指挥开发演示</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>手机端指挥开发演示</h1>
            <p class="description">这是一个通过元宝手机端指挥开发，并在手机浏览器快速体验的演示项目</p>
        </header>
        
        <main>
            <section class="features">
                <h2>功能特点</h2>
                <ul>
                    <li><span class="feature-item">🚀 实时部署</span>：GitHub Actions 自动部署到 GitHub Pages</li>
                    <li><span class="feature-item">📱 手机体验</span>：手机浏览器访问，随时查看最新版本</li>
                    <li><span class="feature-item">🤖 AI协助</span>：通过元宝手机端指挥 AI 进行代码修改</li>
                    <li><span class="feature-item">🔁 快速迭代</span>：快速反馈循环，实时优化改进</li>
                </ul>
            </section>
            
            <section class="demo-area">
                <h2>演示区域</h2>
                <div class="demo-box">
                    <div class="color-picker">
                        <h3>颜色选择器</h3>
                    </div>
                    
                    <div class="counter">
                        <h3>计数器</h3>
                        <button id="counter-btn">点击增加</button>
                        <div id="counter-value">0</div>
                    </div>
                </div>
            </section>
            
            <section class="status">
                <h2>部署状态</h2>
                <div id="deployment-status">
                    <p><strong>版本</strong>: v1.0</p>
                    <p><strong>部署时间</strong>: <span id="deploy-time">刚刚</span></p>
                    <p><strong>访问地址</strong>: <a href="#" id="access-url">等待生成</a></p>
                </div>
            </section>
        </main>
        
        <footer>
            <p>© 2025 手机端指挥开发演示项目 | 通过 GitHub Pages + GitHub Actions 部署</p>
        </footer>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
